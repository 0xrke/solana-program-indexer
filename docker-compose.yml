services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: indexer
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d indexer"]
      interval: 5s
      timeout: 5s
      retries: 5

  indexer:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/indexer
    ports:
      - "3003:3000"
    volumes:
      - ./idl:/app/idl

volumes:
  pgdata:
